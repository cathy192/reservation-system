spring:
  application:
    name: reservation-service

  datasource:
    url: jdbc:postgresql://localhost:5432/reservation_db
    driver-class-name: org.postgresql.Driver
    username: reservation
    password: reservation

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
