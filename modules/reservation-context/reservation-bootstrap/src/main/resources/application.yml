spring:
  application:
    name: reservation-service

  # 로컬 개발: H2 (Docker 없이도 실행 가능)
  # PostgreSQL 사용 시 application-local.yml 참고
  datasource:
    url: jdbc:h2:mem:reservation;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
