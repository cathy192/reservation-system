# Docker Compose 실행 후 이 프로파일 사용:
#   ./gradlew :modules:reservation-context:reservation-bootstrap:bootRun --args='--spring.profiles.active=local'
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/reservation_db
    driver-class-name: org.postgresql.Driver
    username: reservation
    password: reservation

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false
